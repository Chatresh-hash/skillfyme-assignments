apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: account
  template:
    metadata:
      labels:
        app: account
    spec:
      containers:
      - name: account
        image: <your-dockerhub-username>/account-service:latest
        ports:
        - containerPort: 3000
        volumeMounts:
        - name: account-pvc
          mountPath: /data
      volumes:
      - name: account-pvc
        persistentVolumeClaim:
          claimName: account-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: account-service
spec:
  type: NodePort
  selector:
    app: account
  ports:
  - port: 3000
    targetPort: 3000
    nodePort: 30080
